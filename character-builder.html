<!DOCTYPE html>
<html>
  <head>
    <title>Fantasy Character Builder</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&family=Pirata+One&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./styles/texts.css">
    <link rel="stylesheet" href="./styles/index.css">
    <link rel="stylesheet" href="./styles/character-builder.css">
  </head>
  <body>
    
    <div class="create-your-character-grid">
      
      <div class="builder-title-container">
        <p class="character-builder-title">
          Create Your Character
        </p>
      </div>
      <div class="window-grid">

      <div class="character">
        <img src="./assets/images/character-sprites/human-warrior/human.png">
      </div>
      
        <div class="costumization-window">
          <img src="./assets/images/costumization-window.png">
        </div>
        <div class="info-window">
          <img src="./assets/images/character-info-window.png">
        </div>
      </div>
      
    </div>



    <script type="module" src="./scripts/character-builder.js"></script>
  </body>
</html>
