<!DOCTYPE html>
<html>
  <head>
    <title>Fantasy Character Builder</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&family=Pirata+One&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./styles/texts.css">
    <link rel="stylesheet" href="./styles/index.css">
    <link rel="stylesheet" href="./styles/character-builder.css">
  </head>
  <body>
    <div class="page-container">

      <div class="page-title js-page-title">
        <p id="title" class="js-title">Loading...</p>
      </div>
      <div class="main-content">

        <div class="costumization-window">
          <div class="skin-color option">
            <p>Skin Color:</p>
            <input type="color">
          </div>

          <div class="hair-style option">
            <p>Hair Style:</p>
            <input type="radio" name="hair-style" value="hair-one">
            <input type="radio" name="hair-style" value="hair-two">
            <input type="radio" name="hair-style" value="hair-three">
          </div>

          <div class="hair-color option">
            <p>Hair Color:</p>
            <input type="color">
          </div>

          <div class="armor option">
            <p>Armor:</p>
            <input type="radio" name="armor" value="armor-one">
            <input type="radio" name="armor" value="armor-two">
            <input type="radio" name="armor" value="armor-three">
          </div>

          <div class="weapon option">
            <p>Weapon:</p>
            <input type="radio" name="Weapon" value="weapon-one">
            <input type="radio" name="Weapon" value="weapon-one">
            <input type="radio" name="Weapon" value="weapon-one">
          </div>
        </div>

        <div style="--width: 100px" class="character-space js-character-space">
        </div>

        <div class="info-window">
            <p class="name-input-text">Choose a name for your Creation:</p>
            <input type="text" class="name-input">
        </div>

      </div>

      <div class="button-space"></div>
    </div>
