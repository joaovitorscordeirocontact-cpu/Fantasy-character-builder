<!DOCTYPE html>
<html>
  <head>
    <title>Fantasy Character Builder</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&family=Pirata+One&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./styles/texts.css">
    <link rel="stylesheet" href="./styles/index.css">
    <link rel="stylesheet" href="./styles/character-builder.css">
  </head>
  <body>
    <div class="page-container">

      <div class="page-title js-page-title">
        <p id="title" class="js-title">Loading...</p>
      </div>
      <div class="main-content">

        <div class="costumization-window js-customization-window">
          <!--
          Commented out because it will only be used in a next version.

          <div class="hair-style option">
            <p>Hair Style:</p>
            <input type="radio" name="hair-style" value="hair-one">
            <input type="radio" name="hair-style" value="hair-two">
            <input type="radio" name="hair-style" value="hair-three">
          </div>
          -->
          <!--
          <div class="weapon option">
            <p>Weapon:</p>
            <input type="radio" name="Weapon" value="weapon-one">
            <input type="radio" name="Weapon" value="weapon-one">
            <input type="radio" name="Weapon" value="weapon-one">
          </div>
          -->
        </div>

        <div style="--width: 180px" class="character-space js-character-space">
        </div>

        <div class="info-window">
            <p class="name-input-text">Choose a name for your Creation:</p>
            <input type="text" class="name-input js-name-input">
        </div>

      </div>

      <div class="button-container">
        <div class="home-button-space">
          <button class="home-button js-home-button">Home</button>
        </div>
        <div class="create-button-space">
          <button class="create-button js-create-button">Create</button>
        </div>
      </div>

    </div>

   <script type="module" src="./scripts/character-builder.js"></script>
   <script type="module" src="./scripts/armor.js"></script>
  </body>
</html>
