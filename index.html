<!DOCTYPE html>
<html>
  <head>
    <title>Fantasy Character Builder</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&family=Pirata+One&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./styles/texts.css">
    <link rel="stylesheet" href="./styles/index.css">
  </head>
  <body>
    <img class="border-detail-up-left" src="./assets/images/border-detail-up-left.png">
    <img class="border-detail-up-right" src="./assets/images/border-detail-up-left.png">
    <img class="border-detail-down-right" src="./assets/images/border-detail-down-right.png">
    <img class="border-detail-down-left" src="./assets/images/border-detail-down-left.png">

    <div class="site-grid">

      <div class="title-container">
        <p class="main-title" id="title">Fantazy Character Builder</p>
        <p class="subtitle">ASCENDANCE CYCLE</p>
      </div>

      <div class="banner">
        <div class="slider" style="--quantity: 6">

          <div class="item js-human-button" style="--position: 1"><img src="./assets/images/character-sprites/human/human.png"><p class="race-name">HUMAN</p></div>

          <div class="item js-android-button android-item" style="--position: 2"><img class="android-img" src="./assets/images/character-sprites/android/android.png"><p class="race-name">ANDROID</p></div>

          <div class="item js-beastman-button" style="--position: 3"><img src="./assets/images/character-sprites/beastman/beastman.png"><p class="race-name">BEASTMAN</p></div>

          <div class="item js-elf-button" style="--position: 4"><img src="./assets/images/character-sprites/elf/elf.png"><p class="race-name">ELF</p></div>

          <div class="item js-orc-button" style="--position: 5"><img src="./assets/images/character-sprites/orc/orc.png"><p class="race-name">ORC</p></div>

          <div class="item js-shadow-button" style="--position: 6"><img src="./assets/images/character-sprites/shadow/shadow.png"><p class="race-name">SHADOW WEAVER</p></div>

          <div class="crystal-core"><img src="./assets/images/crystal-core-image.png"></div>
        </div>
      </div>
    </div>
    <script type="module" src="./scripts/index.js" defer></script>
  </body>
</html>
